<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>복호두 매출 현황판</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a1628;color:#fff;font-family:'Pretendard','Noto Sans KR',sans-serif;min-height:100vh;padding:16px;}
.dash{max-width:1400px;margin:0 auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.brand{font-size:16px;font-weight:600;color:#7eb8e8;}
.brand span{color:#fff;}
.dot{display:inline-block;width:8px;height:8px;background:#3db87a;border-radius:50%;margin-right:8px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.last-update{font-size:11px;color:#6b8fa8;}
.upload-btn{font-size:11px;padding:5px 12px;background:#1a3a5c;border:0.5px solid #2a5a8a;color:#7eb8e8;border-radius:6px;cursor:pointer;}
.upload-btn:hover{background:#1e4a70;}
#fileInput{display:none;}

/* 탭 */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tab{font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;border:1px solid #1e3347;color:#6b8fa8;background:transparent;transition:all .2s;font-weight:500;}
.tab:hover{border-color:#2a5a8a;color:#aac4e0;}
.tab.active{color:#fff;font-weight:700;}
.tab.dimmed{opacity:1;border-color:#1e3347 !important;color:#4a6070 !important;}
.tab[data-color="전체"]{border-color:#2a5a8a;color:#7eb8e8;}
.tab[data-color="전체"].active{background:#1a3a5c;border-color:#2a5a8a;color:#7eb8e8;}
.tab[data-color="김태환 과장"]{border-color:#22c55e;color:#22c55e;}
.tab[data-color="김태환 과장"].active{background:rgba(34,197,94,0.25);border-color:#22c55e;color:#22c55e;}
.tab[data-color="임도형 과장"]{border-color:#ef4444;color:#ef4444;}
.tab[data-color="임도형 과장"].active{background:rgba(239,68,68,0.25);border-color:#ef4444;color:#ef4444;}
.tab[data-color="이중섭 대리"]{border-color:#facc15;color:#facc15;}
.tab[data-color="이중섭 대리"].active{background:rgba(250,204,21,0.25);border-color:#facc15;color:#facc15;}
.tab[data-color="박영태 대리"]{border-color:#3b82f6;color:#3b82f6;}
.tab[data-color="박영태 대리"].active{background:rgba(59,130,246,0.25);border-color:#3b82f6;color:#3b82f6;}
.tab[data-color="강동우 사원"]{border-color:#a855f7;color:#a855f7;}
.tab[data-color="강동우 사원"].active{background:rgba(168,85,247,0.25);border-color:#a855f7;color:#a855f7;}
.tab[data-region="서울"].active{background:rgba(59,130,246,0.2);border-color:#3b82f6;color:#3b82f6;}
.tab[data-region="서울"]:hover{border-color:#3b82f6;color:#3b82f6;}
.tab[data-region="경기"].active{background:rgba(34,197,94,0.2);border-color:#22c55e;color:#22c55e;}
.tab[data-region="경기"]:hover{border-color:#22c55e;color:#22c55e;}
.tab[data-region="인천"].active{background:rgba(6,182,212,0.2);border-color:#06b6d4;color:#06b6d4;}
.tab[data-region="인천"]:hover{border-color:#06b6d4;color:#06b6d4;}
.tab[data-region="부산"].active{background:rgba(249,115,22,0.2);border-color:#f97316;color:#f97316;}
.tab[data-region="부산"]:hover{border-color:#f97316;color:#f97316;}
.tab[data-region="대구"].active{background:rgba(168,85,247,0.2);border-color:#a855f7;color:#a855f7;}
.tab[data-region="대구"]:hover{border-color:#a855f7;color:#a855f7;}
.tab[data-region="광주"].active{background:rgba(236,72,153,0.2);border-color:#ec4899;color:#ec4899;}
.tab[data-region="광주"]:hover{border-color:#ec4899;color:#ec4899;}
.tab[data-region="대전"].active{background:rgba(250,204,21,0.2);border-color:#facc15;color:#facc15;}
.tab[data-region="대전"]:hover{border-color:#facc15;color:#facc15;}
.tab[data-region="울산"].active{background:rgba(20,184,166,0.2);border-color:#14b8a6;color:#14b8a6;}
.tab[data-region="울산"]:hover{border-color:#14b8a6;color:#14b8a6;}
.tab[data-region="세종"].active{background:rgba(132,204,22,0.2);border-color:#84cc16;color:#84cc16;}
.tab[data-region="세종"]:hover{border-color:#84cc16;color:#84cc16;}
.tab[data-region="충북"].active{background:rgba(251,146,60,0.2);border-color:#fb923c;color:#fb923c;}
.tab[data-region="충북"]:hover{border-color:#fb923c;color:#fb923c;}
.tab[data-region="충남"].active{background:rgba(244,63,94,0.2);border-color:#f43f5e;color:#f43f5e;}
.tab[data-region="충남"]:hover{border-color:#f43f5e;color:#f43f5e;}
.tab[data-region="경북"].active{background:rgba(139,92,246,0.2);border-color:#8b5cf6;color:#8b5cf6;}
.tab[data-region="경북"]:hover{border-color:#8b5cf6;color:#8b5cf6;}
.tab[data-region="경남"].active{background:rgba(14,165,233,0.2);border-color:#0ea5e9;color:#0ea5e9;}
.tab[data-region="경남"]:hover{border-color:#0ea5e9;color:#0ea5e9;}
.tab[data-region="전북"].active{background:rgba(217,70,239,0.2);border-color:#d946ef;color:#d946ef;}
.tab[data-region="전북"]:hover{border-color:#d946ef;color:#d946ef;}
.tab[data-region="전남"].active{background:rgba(16,185,129,0.2);border-color:#10b981;color:#10b981;}
.tab[data-region="전남"]:hover{border-color:#10b981;color:#10b981;}
.tab[data-region="강원"].active{background:rgba(245,158,11,0.2);border-color:#f59e0b;color:#f59e0b;}
.tab[data-region="강원"]:hover{border-color:#f59e0b;color:#f59e0b;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px;}
.kpi{background:#111e2e;border-radius:10px;padding:12px 16px;border:0.5px solid #1e3347;}
.kl{font-size:11px;color:#6b8fa8;margin-bottom:5px;}
.kv{font-size:22px;font-weight:600;color:#e0f0ff;}
.ks{font-size:11px;margin-top:3px;}
.pos{color:#3db87a;}.neg{color:#e05555;}.warn{color:#f0a04a;}

/* 메인 그리드 */
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;align-items:start;}
@media(max-width:900px){.main-grid{grid-template-columns:1fr;}}
.card{background:#111e2e;border-radius:10px;padding:14px;border:0.5px solid #1e3347;}
.ctitle{font-size:12px;color:#6b8fa8;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.filter-sel{font-size:10px;background:#1a2f44;border:0.5px solid #1e3347;color:#aac4e0;padding:3px 8px;border-radius:5px;}

/* 매장 리스트 */
.branch-scroll{overflow-y:auto;padding-right:4px;}
.branch-scroll::-webkit-scrollbar{width:3px;}
.branch-scroll::-webkit-scrollbar-thumb{background:#1e3347;border-radius:2px;}
/* 전체 스크롤바 통일 */
*::-webkit-scrollbar{width:3px;height:3px;}
*::-webkit-scrollbar-track{background:transparent;}
*::-webkit-scrollbar-thumb{background:#1e3347;border-radius:2px;}
*::-webkit-scrollbar-thumb:hover{background:#2a5a8a;}
.bi{margin-bottom:9px;}
.bh{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;align-items:center;}
.bn{color:#c8dff0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52%;}
.bv{font-weight:600;color:#e0f0ff;font-size:12px;}
.binfo{display:flex;align-items:center;gap:5px;}
.bb{background:#1a2f44;border-radius:3px;height:5px;}
.bf{height:5px;border-radius:3px;transition:width .8s ease;}
.badge{font-size:9px;padding:1px 5px;border-radius:3px;}
.ok{background:#0d3320;color:#3db87a;}
.wr{background:#3a1f0a;color:#f0a04a;}
.fl{background:#3a0d0d;color:#e05555;}

/* 차트 */
.cw{position:relative;height:200px;}
.cw-sm{position:relative;height:150px;}

/* 하단 */
.bot-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;}

/* 담당자 */
.mgr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.mgr-card{background:#0d1b2a;border-radius:7px;padding:9px 12px;border:0.5px solid #1e3347;}
.mgr-name{font-size:10px;color:#6b8fa8;margin-bottom:3px;}
.mgr-row{display:flex;justify-content:space-between;align-items:baseline;}
.mgr-val{font-size:13px;font-weight:600;color:#e0f0ff;}
.mgr-cnt{font-size:10px;color:#6b8fa8;}
.mgr-bar{background:#1a2f44;height:3px;border-radius:2px;margin-top:5px;}
.mgr-bf{height:3px;border-radius:2px;background:#378add;transition:width .8s ease;}

/* KPI 클릭 가능 */
.kpi-click{cursor:pointer;transition:border-color .2s,background .2s;}
.kpi-click:hover{border-color:#2a5a8a;background:#172840;}

/* KPI 매장 목록 모달 */
.kpi-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2000;align-items:center;justify-content:center;}
.kpi-modal-overlay.open{display:flex;}
.kpi-modal-box{background:#111e2e;border:0.5px solid #2a5a8a;border-radius:14px;padding:20px;width:92%;max-width:620px;max-height:80vh;display:flex;flex-direction:column;position:relative;}
.kpi-modal-title{font-size:14px;font-weight:600;color:#e0f0ff;margin-bottom:5px;}
.kpi-modal-sub{font-size:11px;color:#6b8fa8;margin-bottom:14px;}
.kpi-modal-close{position:absolute;top:14px;right:16px;background:transparent;border:none;color:#6b8fa8;font-size:18px;cursor:pointer;}
.kpi-modal-close:hover{color:#aac4e0;}
.kpi-modal-list{overflow-y:auto;flex:1;}
.kpi-modal-list::-webkit-scrollbar{width:3px;}
.kpi-modal-list::-webkit-scrollbar-thumb{background:#1e3347;border-radius:2px;}
.kml-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:7px;margin-bottom:5px;background:#0d1b2a;border:0.5px solid #1a2f44;}
.kml-left{display:flex;align-items:center;gap:8px;}
.kml-rank{font-size:10px;color:#6b8fa8;width:18px;text-align:center;}
.kml-name{font-size:12px;color:#c8dff0;}
.kml-mgr{font-size:10px;color:#6b8fa8;}
.kml-right{text-align:right;}
.kml-val{font-size:12px;font-weight:600;color:#e0f0ff;}
.kml-rate{font-size:10px;margin-top:1px;}

/* 헤더 월 표시 */
.month-badge{font-size:10px;background:#1a2f44;color:#6b8fa8;padding:2px 8px;border-radius:4px;}

/* 매장 월별 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#111e2e;border:0.5px solid #2a5a8a;border-radius:14px;padding:18px 24px 18px;width:96%;max-width:1100px;max-height:92vh;overflow-y:auto;position:relative;}
.modal-title{font-size:14px;font-weight:700;color:#e0f0ff;margin-bottom:3px;}
.modal-sub{font-size:11px;color:#6b8fa8;margin-bottom:12px;}
.modal-close{position:absolute;top:14px;right:16px;background:transparent;border:none;color:#6b8fa8;font-size:18px;cursor:pointer;line-height:1;}
.modal-close:hover{color:#aac4e0;}
.modal-cw{position:relative;height:260px;}
</style>
</head>
<body>
<div class="dash">

  <!-- 헤더 -->
  <div class="topbar">
    <div class="brand"><span class="dot"></span><span>복호두 매출 현황판</span></div>
    <div class="top-right">
      <span class="last-update" id="lastUpdate">데이터 로딩 중...</span>
      <label class="upload-btn">
        📂 CSV 업데이트
        <input type="file" id="fileInput" accept=".csv">
      </label>
    </div>
  </div>

  <!-- 필터 탭 -->
  <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;align-items:center;">
    <span style="font-size:10px;color:#6b8fa8;white-space:nowrap;">담당자</span>
    <div class="tabs" id="tabs" style="margin-bottom:0;"></div>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center;">
    <span style="font-size:10px;color:#6b8fa8;white-space:nowrap;">지&nbsp;&nbsp;&nbsp;&nbsp;역</span>
    <div class="tabs" id="regionTabs" style="margin-bottom:0;"></div>
  </div>
  <!-- 매장 검색 -->
  <div style="position:relative;margin-bottom:14px;max-width:280px;">
    <span style="font-size:10px;color:#6b8fa8;position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;">🔍</span>
    <input id="branchSearch" type="text" placeholder="매장명 검색..." autocomplete="off"
      style="width:100%;padding:6px 32px 6px 28px;background:#1a2f44;border:0.5px solid #2a5a8a;border-radius:7px;color:#e0f0ff;font-size:11px;outline:none;"
      oninput="onSearchInput(this.value)"
      onfocus="showSuggestions(this.value)"
      onblur="setTimeout(hideSuggestions,150)">
    <button id="searchClear" onclick="clearSearch()" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#6b8fa8;cursor:pointer;font-size:13px;line-height:1;">✕</button>
    <div id="searchSuggestions" style="display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#111e2e;border:0.5px solid #2a5a8a;border-radius:7px;z-index:500;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.5);"></div>
  </div>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi"><div class="kl">운영 매장 수</div><div class="kv" id="k1">-</div><div class="ks" style="color:#6b8fa8;" id="k1s">-</div></div>
    <div class="kpi"><div class="kl" id="k2l">최근월 평균 매출</div><div class="kv" id="k2">-</div><div class="ks" id="k2s">-</div></div>
    <div class="kpi kpi-click" id="kpi3" onclick="openKpiModal('over')" title="클릭하여 달성 매장 보기"><div class="kl" id="k3l">전년 동월 대비 5%↑ 목표 달성</div><div class="kv" id="k3">-</div><div class="ks" id="k3s">-</div></div>
    <div class="kpi kpi-click" id="kpi6" onclick="openKpiModal('stable')" title="클릭하여 매장 보기"><div class="kl" id="k6l">전년비 ±2% 유지 매장</div><div class="kv" id="k6">-</div><div class="ks" id="k6s">-</div></div>
    <div class="kpi"><div class="kl">전월 대비 성장</div><div class="kv" id="k4">-</div><div class="ks" id="k4s">-</div></div>
    <div class="kpi"><div class="kl">최고 매출 매장</div><div class="kv" id="k5" style="font-size:16px;">-</div><div class="ks" id="k5s" style="color:#6b8fa8;">-</div></div>
  </div>

  <!-- 메인 -->
  <div class="main-grid">
    <div class="card">
      <div class="ctitle">
        <span id="branchListTitle">매장별 매출 vs 목표</span>
        <select class="filter-sel" id="sortSel" onchange="render()">
          <option value="avg_desc">매출 높은 순</option>
          <option value="avg_asc">매출 낮은 순</option>
          <option value="yoy_desc">전년비 높은 순</option>
          <option value="name">매장명 순</option>
        </select>
      </div>
      <div class="branch-scroll" id="branchList" style="max-height:420px;"></div>
    </div>
    <div class="card">
      <div class="ctitle">월별 합산 매출 추이 (25년 vs 26년)</div>
      <div class="cw"><canvas id="trendChart" role="img" aria-label="월별 합산 매출 추이"></canvas></div>
      <div id="trendSummary" style="margin-top:10px;overflow-x:auto;"></div>
    </div>
  </div>

  <!-- 중단: 매장 수 + 담당자 평균 -->
  <div class="main-grid" style="margin-bottom:12px;">
    <div class="card">
      <div class="ctitle">월별 매장 수</div>
      <div class="cw-sm"><canvas id="storeChart" role="img" aria-label="월별 매장 수 추이"></canvas></div>
      <div id="storeSummary" style="margin-top:8px;overflow-x:auto;"></div>
    </div>
    <div class="card">
      <div class="ctitle">담당자별 관리 매장 평균</div>
      <div class="mgr-grid" id="mgrGrid"></div>
    </div>
  </div>

  <!-- 하단 -->
  <div class="bot-grid">
    <div class="card">
      <div class="ctitle" id="distTitle">매출 구간 분포</div>
      <div class="cw-sm"><canvas id="distChart" role="img" aria-label="매출 구간 분포"></canvas></div>
    </div>
    <div class="card">
      <div class="ctitle">월별 증감률</div>
      <div class="cw-sm"><canvas id="growChart" role="img" aria-label="월별 증감률"></canvas></div>
    </div>
    <div class="card">
      <div class="ctitle" id="rankTitle">매출 순위 (상위 15개)</div>
      <div id="rankList" style="overflow-y:auto;max-height:150px;padding-right:2px;"></div>
    </div>
    <div class="card">
      <div class="ctitle">지역별 평균 매출</div>
      <div id="regionList" style="overflow-y:auto;max-height:150px;padding-right:2px;"></div>
    </div>
  </div>

</div>

<!-- KPI 매장 목록 모달 -->
<div class="kpi-modal-overlay" id="kpiModal">
  <div class="kpi-modal-box">
    <button class="kpi-modal-close" onclick="closeKpiModal()">✕</button>
    <div class="kpi-modal-title" id="kpiModalTitle">-</div>
    <div class="kpi-modal-sub" id="kpiModalSub">-</div>
    <div class="kpi-modal-list" id="kpiModalList"></div>
  </div>
</div>

<!-- 매장 월별 매출 모달 -->
<div class="modal-overlay" id="branchModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">-</div>
    <div class="modal-sub" id="modalSub">-</div>
    <div class="modal-cw"><canvas id="modalChart"></canvas></div>
    <!-- 월별 증감 수치 카드 -->
    <div id="modalSummary" style="margin-top:10px;overflow-x:auto;"></div>
    <!-- 물류 매출 섹션 -->
    <div id="modalLogistics" style="margin-top:14px;"></div>
  </div>
</div>

<script>
// chartjs-plugin-datalabels 전역 등록 (growChart 전용)
if(typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const GOAL_GROWTH = 0.05; // 전년 대비 5% 목표
let ALL = [];       // 26년 데이터
let ALL25 = {};     // 25년 데이터 {name: months[]}
let currentFilter = 'all';
let currentRegion = 'all';
let currentSearch = '';
let charts = {};

function fmt(n){ return Math.round(n/10000).toLocaleString()+'만원'; }

// 26년 데이터에서 마지막 데이터 월 인덱스 (0~11)
function getLastMonthIdx(data){
  // 전체 매장의 최대 유효 월 인덱스
  let maxIdx = -1;
  data.forEach(b=>{
    for(let i=11;i>=0;i--){
      if(b.months[i]>0){ if(i>maxIdx) maxIdx=i; break; }
    }
  });
  return maxIdx;
}

// 매장의 마지막 유효 월 인덱스
function branchLastIdx(b){
  for(let i=11;i>=0;i--){ if(b.months[i]>0) return i; }
  return -1;
}

// 25년 동일 월 매출 조회
function get25(name, monthIdx){
  const d = ALL25[name];
  if(!d) return 0;
  return d[monthIdx]||0;
}

// 전년 대비 목표값 (작년 동월 * 1.05)
function getGoal(name, monthIdx){
  const v25 = get25(name, monthIdx);
  return v25 > 0 ? Math.round(v25 * (1 + GOAL_GROWTH)) : 0;
}

// CSV 파싱 (26년 데이터용)
function parseCSV(text){
  const lines = text.trim().split('\n');
  const result = [];
  for(let i=1;i<lines.length;i++){
    const cols = lines[i].split(',');
    if(cols.length < 4) continue;
    const months = cols.slice(3,15).map(v=>parseInt(v)||0);
    const vals = months.filter(v=>v>0);
    if(!vals.length) continue;
    result.push({
      no: parseInt(cols[0])||i,
      manager: cols[1].trim(),
      name: cols[2].trim(),
      region: cols.length>15 ? cols[3].trim() : '기타',
      months: months
    });
  }
  return result;
}

function filtered(){
  let d = currentFilter==='all' ? ALL : ALL.filter(b=>b.manager===currentFilter);
  if(currentRegion!=='all') d = d.filter(b=>b.region===currentRegion);
  if(currentSearch) d = d.filter(b=>b.name.includes(currentSearch));
  return d;
}

function setFilter(f){
  currentFilter=f;
  render();
}

function renderTabs(){
  const ORDER=['김태환 과장','임도형 과장','이중섭 대리','박영태 대리','강동우 사원'];
  const existing=new Set(ALL.map(b=>b.manager));
  const sorted=ORDER.filter(m=>existing.has(m));
  const others=[...existing].filter(m=>!ORDER.includes(m)).sort();
  const mgrs=['all',...sorted,...others];
  window.__tabMgrs = mgrs;
  const el=document.getElementById('tabs');
  el.innerHTML=mgrs.map((m,i)=>{
    const label=m==='all'?'전체':m;
    return `<div class="tab" id="tab-${i}" data-color="${label}" onclick="setFilter(window.__tabMgrs[${i}])">${label}</div>`;
  }).join('');
  updateTabActive();
}

function updateTabActive(){
  const mgrs=window.__tabMgrs||[];
  const hasFilter=currentFilter!=='all';
  document.querySelectorAll('#tabs .tab').forEach((t,i)=>{
    const isActive=mgrs[i]===currentFilter;
    t.classList.toggle('active', isActive);
    // 전체 선택이거나 본인이 선택된 탭은 dimmed 해제, 나머지는 dimmed
    t.classList.toggle('dimmed', hasFilter && !isActive && mgrs[i]!=='all');
  });
  const regions=window.__regionList||[];
  document.querySelectorAll('#regionTabs .tab').forEach((t,i)=>{
    t.classList.toggle('active', regions[i]===currentRegion);
  });
}

function renderRegionTabs(){
  const regions=['all',...Array.from(new Set(ALL.map(b=>b.region))).filter(r=>r&&r!=='all').sort((a,b)=>a.localeCompare(b,'ko'))];
  window.__regionList=regions;
  const el=document.getElementById('regionTabs');
  el.innerHTML=regions.map((r,i)=>{
    const label=r==='all'?'전체':r;
    return `<div class="tab" id="rtab-${i}" data-region="${r}" onclick="setRegion(window.__regionList[${i}])">${label}</div>`;
  }).join('');
  updateTabActive();
}

function setRegion(r){
  currentRegion=r;
  render();
}

function onSearchInput(val){
  currentSearch=val.trim();
  document.getElementById('searchClear').style.display=currentSearch?'block':'none';
  showSuggestions(val);
  render();
}

function showSuggestions(val){
  const box=document.getElementById('searchSuggestions');
  const q=val.trim();
  if(!q){ box.style.display='none'; return; }
  const matches=ALL.filter(b=>b.name.includes(q)).slice(0,10);
  if(!matches.length){ box.style.display='none'; return; }
  box.innerHTML=matches.map(b=>`
    <div onclick="selectBranch('${b.name.replace(/'/g,"\\'")}')"
      style="padding:7px 12px;font-size:11px;color:#c8dff0;cursor:pointer;border-bottom:0.5px solid #1a2f44;"
      onmouseover="this.style.background='#1a3a5c'" onmouseout="this.style.background=''">
      <span style="color:#e0f0ff;font-weight:600;">${b.name}</span>
      <span style="color:#6b8fa8;font-size:10px;margin-left:6px;">${b.manager} · ${b.region}</span>
    </div>`).join('');
  box.style.display='block';
}

function hideSuggestions(){
  document.getElementById('searchSuggestions').style.display='none';
}

function selectBranch(name){
  currentSearch=name;
  document.getElementById('branchSearch').value=name;
  document.getElementById('searchClear').style.display='block';
  hideSuggestions();
  render();
}

function clearSearch(){
  currentSearch='';
  document.getElementById('branchSearch').value='';
  document.getElementById('searchClear').style.display='none';
  hideSuggestions();
  render();
}

function destroyChart(key){
  if(charts[key]){ charts[key].destroy(); delete charts[key]; }

  const fmtDetail=v=>{
    if(v<=0) return '-';
    if(v>=10000){
      const uk=Math.floor(v/10000);
      const rem=v%10000;
      return rem>0?`${uk}억 ${rem.toLocaleString()}만원`:`${uk}억`;
    }
    return v.toLocaleString()+'만원';
  };
  const sums26=MONTHS.map((_,i)=>data.reduce((s,b)=>s+(b.months[i]||0),0));
  const active=sums26.map((v,i)=>({v,i})).filter(x=>x.v>0);
  if(!active.length) return;
  const labels=active.map(x=>MONTHS[x.i]);
  const vals26=active.map(x=>Math.round(x.v/10000));
  const vals25=active.map(x=>{
    return data.reduce((s,b)=>{
      const v=get25(b.name, x.i);
      return s+v;
    },0);
  }).map(v=>Math.round(v/10000));
  // 각 월별 매장 수
  const counts26=active.map(x=>data.filter(b=>(b.months[x.i]||0)>0).length);

// 월별 증감률 (26년 기준)
function renderGrow(data){
  const sums=MONTHS.map((_,i)=>data.reduce((s,b)=>s+(b.months[i]||0),0));
  const active=sums.map((v,i)=>({v,i})).filter(x=>x.v>0);
  if(active.length<2) return;
  const labels=[],rates=[],diffs=[];
  for(let i=1;i<active.length;i++){
    const prev=active[i-1],cur=active[i];
    labels.push(MONTHS[prev.i]+'→'+MONTHS[cur.i]);
    rates.push(prev.v?Math.round((cur.v-prev.v)/prev.v*1000)/10:0);
    diffs.push(Math.round((cur.v-prev.v)/10000)); // 만원 단위 금액 차이
  }
  destroyChart('grow');
  charts.grow=new Chart(document.getElementById('growChart'),{
    type:'bar',
    data:{labels,datasets:[{data:rates,backgroundColor:rates.map(v=>v>=0?'#0f6e56':'#a32d2d'),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          label:c=>{
            const rate=c.parsed.y;
            const diff=diffs[c.dataIndex];
            const sign=diff>=0?'+':'';
            return [`증감률: ${rate}%`, `증감액: ${sign}${diff.toLocaleString()}만원`];
          }
        }},
        datalabels:{
          display:true,
          anchor:ctx=>rates[ctx.dataIndex]>=0?'end':'start',
          align:ctx=>rates[ctx.dataIndex]>=0?'top':'bottom',
          formatter:(v,ctx)=>{
            const sign=v>=0?'+':'';
            const diff=diffs[ctx.dataIndex];
            const dsign=diff>=0?'+':'';
            return [`${sign}${v}%`, `${dsign}${diff.toLocaleString()}만`];
          },
          color:ctx=>rates[ctx.dataIndex]>=0?'#3db87a':'#e05555',
          font:{size:9,weight:'bold'},
          padding:2,
          textAlign:'center'
        }
      },
      scales:{x:{ticks:{color:'#6b8fa8',font:{size:10}},grid:{display:false}},
        y:{ticks:{color:'#6b8fa8',font:{size:10},callback:v=>v+'%'},grid:{color:'#1a2f44'},
          afterDataLimits:scale=>{
            const range=scale.max-scale.min;
            scale.max+=range*0.35;
            if(scale.min<0) scale.min+=range*-0.35;
          }}}}
  });
}

// 순위: 마지막 월 실매출 기준
function renderPie(data, lastIdx){
  const withVal=data.map(b=>({...b,lastVal:b.months[lastIdx]||0})).filter(b=>b.lastVal>0);
  const top=[...withVal].sort((a,b)=>b.lastVal-a.lastVal).slice(0,15);
  const maxVal=top[0]?top[0].lastVal:1;
  const el=document.getElementById('rankList');
  el.innerHTML=top.map((b,i)=>{
    const goal=getGoal(b.name, lastIdx);
    const pct=Math.round(b.lastVal/maxVal*100);
    const ac=goal>0?(b.lastVal>=goal?'#3db87a':b.lastVal>=goal*0.9?'#f0a04a':'#e05555'):'#378add';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span style="color:#6b8fa8;font-size:10px;">${i+1}</span>`;
    return `<div style="margin-bottom:6px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
        <div style="display:flex;align-items:center;gap:5px;">
          <span style="width:16px;text-align:center;font-size:11px;">${medal}</span>
          <span style="font-size:10px;color:#c8dff0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;">${b.name}</span>
        </div>
        <span style="font-size:11px;font-weight:600;color:#e0f0ff;">${fmt(b.lastVal)}</span>
      </div>
      <div style="background:#1a2f44;border-radius:3px;height:4px;">
        <div style="width:${pct}%;height:4px;border-radius:3px;background:${ac};transition:width .8s ease;"></div>
      </div>
    </div>`;
  }).join('');
}

function renderMgr(data, lastIdx){
  const mgrs={};
  data.forEach(b=>{
    const k=b.manager;
    const v=b.months[lastIdx]||0;
    if(v<=0) return;
    if(!mgrs[k]) mgrs[k]={sum:0,cnt:0};
    mgrs[k].sum+=v; mgrs[k].cnt++;
  });
  const entries=Object.entries(mgrs).sort((a,b)=>b[1].sum/b[1].cnt-a[1].sum/a[1].cnt);
  const maxAvg=Math.max(...entries.map(([,v])=>v.sum/v.cnt));
  const el=document.getElementById('mgrGrid');
  el.innerHTML=entries.map(([k,v])=>{
    const a=Math.round(v.sum/v.cnt);
    const pct=Math.round(a/maxAvg*100);
    const cls=a>=30000000?'pos':'neg';
    return `<div class="mgr-card">
      <div class="mgr-name">${k}</div>
      <div class="mgr-row"><span class="mgr-val ${cls}">${fmt(a)}</span><span class="mgr-cnt">${v.cnt}개점</span></div>
      <div class="mgr-bar"><div class="mgr-bf" style="width:${pct}%;"></div></div>
    </div>`;
  }).join('');
}

function renderRegionAvg(data, lastIdx){
  const map={};
  data.forEach(b=>{
    const v=b.months[lastIdx]||0;
    if(v<=0) return;
    if(!map[b.region]) map[b.region]={sum:0,cnt:0};
    map[b.region].sum+=v; map[b.region].cnt++;
  });
  const entries=Object.entries(map).sort((a,b)=>b[1].sum/b[1].cnt-a[1].sum/a[1].cnt);
  const maxA=entries.length?entries[0][1].sum/entries[0][1].cnt:1;
  const el=document.getElementById('regionList');
  el.innerHTML=entries.map(([region,v])=>{
    const avg=Math.round(v.sum/v.cnt);
    const pct=Math.round(avg/maxA*100);
    const col=avg>=30000000?'#3db87a':avg>=24000000?'#f0a04a':'#e05555';
    return `<div style="margin-bottom:7px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
        <span style="font-size:10px;color:#c8dff0;">${region} <span style="color:#6b8fa8;font-size:9px;">${v.cnt}개점</span></span>
        <span style="font-size:11px;font-weight:600;color:#e0f0ff;">${fmt(avg)}</span>
      </div>
      <div style="background:#1a2f44;border-radius:3px;height:4px;">
        <div style="width:${pct}%;height:4px;border-radius:3px;background:${col};transition:width .8s;"></div>
      </div>
    </div>`;
  }).join('');
}

// 매장 리스트: 마지막 월 매출 vs 전년 동월 대비 5% 목표
function renderBranches(lastIdx){
  const data=[...filtered()];
  const sort=document.getElementById('sortSel').value;
  if(sort==='avg_desc') data.sort((a,b)=>(b.months[lastIdx]||0)-(a.months[lastIdx]||0));
  else if(sort==='avg_asc') data.sort((a,b)=>(a.months[lastIdx]||0)-(b.months[lastIdx]||0));
  else if(sort==='yoy_desc') data.sort((a,b)=>{
    const ra = (()=>{ const c=a.months[lastIdx]||0, v=get25(a.name,lastIdx); return v>0?(c-v)/v*100:-999; })();
    const rb = (()=>{ const c=b.months[lastIdx]||0, v=get25(b.name,lastIdx); return v>0?(c-v)/v*100:-999; })();
    return rb-ra;
  });
  else data.sort((a,b)=>a.name.localeCompare(b.name,'ko'));

  const monthLabel=MONTHS[lastIdx];
  document.getElementById('branchListTitle').textContent=`매장별 ${monthLabel} 매출 · 전년 대비 5%↑ 목표`;
  const el=document.getElementById('branchList');
  el.innerHTML=data.map((b,idx)=>{
    const cur=b.months[lastIdx]||0;
    const goal=getGoal(b.name, lastIdx);
    const v25=get25(b.name, lastIdx);
    let r=0, cls='fl', lbl='목표없음', bc='#6b8fa8';
    if(goal>0){
      r=Math.round(cur/goal*100);
      cls=r>=100?'ok':r>=90?'wr':'fl';
      lbl=r>=100?'달성':'미달';
      bc=r>=100?'#3db87a':r>=90?'#f0a04a':'#e05555';
    }
    const fill=Math.min(r||Math.min(100,Math.round(cur/30000000*100)),130);
    const yoyStr=v25>0?((cur-v25)/v25*100).toFixed(1)+'%':'-';
    const yoyCls=v25>0&&cur>=v25?'pos':'neg';
    return `<div class="bi branch-item" data-idx="${idx}" style="cursor:pointer;" title="${b.name} 클릭 시 월별 상세 보기">
      <div class="bh">
        <span class="bn" title="${b.name}">${b.name}</span>
        <div class="binfo">
          <span class="badge ${cls}">${lbl}${goal>0?' '+r+'%':''}</span>
          <span class="bv">${fmt(cur)}</span>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:2px;">
        <span style="font-size:9px;color:#6b8fa8;">목표: ${goal>0?fmt(goal):'-'} · 전년동월: ${v25>0?fmt(v25):'-'}</span>
        <span style="font-size:9px;" class="${yoyCls}">전년비 ${yoyStr}</span>
      </div>
      <div class="bb"><div class="bf" style="width:${Math.min(fill,100)}%;background:${bc};"></div></div>
    </div>`;
  }).join('');
  window.__branchData = data;
  el.querySelectorAll('.branch-item').forEach(item=>{
    item.addEventListener('click',function(){
      const b=window.__branchData[parseInt(this.dataset.idx)];
      if(b) openBranchModal(b);
    });
    item.addEventListener('mouseenter',function(){ this.style.background='rgba(55,138,221,0.07)'; this.style.borderRadius='6px'; });
    item.addEventListener('mouseleave',function(){ this.style.background=''; });
  });
}

function render(){
  const data=filtered();
  if(!data.length) return;
  const lastIdx=getLastMonthIdx(data);
  if(lastIdx<0) return;
  const monthLabel=MONTHS[lastIdx];

  // KPI 계산: 마지막 월 기준
  const curVals=data.map(b=>b.months[lastIdx]||0).filter(v=>v>0);
  const avgVal=curVals.length?curVals.reduce((s,v)=>s+v,0)/curVals.length:0;

  // 전년 대비 5% 목표 달성 매장 목록 저장
  const overBranches = data.filter(b=>{
    const cur=b.months[lastIdx]||0;
    const goal=getGoal(b.name,lastIdx);
    return goal>0&&cur>=goal;
  });
  const over = overBranches.length;
  const hasGoal=data.filter(b=>getGoal(b.name,lastIdx)>0).length;

  // 전년 대비 ±2% 유지 매장 (목표 미달성이지만 -2%~+5% 사이, 즉 98%~105% 사이)
  const stableBranches = data.filter(b=>{
    const cur=b.months[lastIdx]||0;
    const v25=get25(b.name,lastIdx);
    if(!v25||!cur) return false;
    const rate=(cur-v25)/v25*100;
    return rate>=-2&&rate<=2; // ±2% 이내 (전년 대비 -2%~+2%)
  });

  window.__overBranches = overBranches;
  window.__stableBranches = stableBranches;
  window.__lastIdx = lastIdx;

  // 전월 대비
  const prevIdx=lastIdx>0?lastIdx-1:-1;
  let growStr='-',growCls='';
  if(prevIdx>=0){
    const sumCur=data.reduce((s,b)=>s+(b.months[lastIdx]||0),0);
    const sumPrev=data.reduce((s,b)=>s+(b.months[prevIdx]||0),0);
    if(sumPrev>0){
      const g=((sumCur-sumPrev)/sumPrev*100).toFixed(1);
      growStr=(g>0?'+':'')+g+'%';
      growCls=parseFloat(g)>=0?'pos':'neg';
    }
  }

  // 최고 매출 매장: 26년 전체 기간 중 가장 높은 단일 월 실매출
  let topBranch=null, topVal=0, topMonthLabel='';
  ALL.forEach(b=>{
    b.months.forEach((v,i)=>{
      if(v>topVal){topVal=v;topBranch=b;topMonthLabel=MONTHS[i];}
    });
  });

  document.getElementById('k1').textContent=data.length+'개';
  document.getElementById('k1s').textContent='전체 '+ALL.length+'개 중';
  document.getElementById('k2l').textContent=monthLabel+' 평균 매출';
  document.getElementById('k2').textContent=fmt(avgVal);
  const avgGoal=data.reduce((s,b)=>s+getGoal(b.name,lastIdx),0)/data.length;
  const d2=avgGoal>0?((avgVal-avgGoal)/avgGoal*100).toFixed(1):null;
  document.getElementById('k2s').className='ks '+(d2!==null&&parseFloat(d2)>=0?'pos':'neg');
  document.getElementById('k2s').textContent=d2!==null?`목표 대비 ${parseFloat(d2)>=0?'+':''}${d2}%`:'';
  document.getElementById('k3l').textContent=`${monthLabel} 전년비 5%↑ 목표 달성`;
  document.getElementById('k3').textContent=`${over}개 (${hasGoal>0?Math.round(over/hasGoal*100):0}%)`;
  document.getElementById('k3s').className='ks '+(over/Math.max(hasGoal,1)>=0.5?'pos':'warn');
  document.getElementById('k3s').textContent='미달 '+(hasGoal-over)+'개';
  document.getElementById('k6l').textContent=`${monthLabel} 전년비 ±2% 유지`;
  document.getElementById('k6').textContent=`${stableBranches.length}개`;
  document.getElementById('k6s').className='ks warn';
  document.getElementById('k6s').textContent=`전년 대비 -2%~+2% 이내`;
  document.getElementById('k4').textContent=growStr;
  document.getElementById('k4').className='kv '+(growStr.startsWith('+')?'pos':growStr==='-'?'':'neg');
  document.getElementById('k4s').textContent=prevIdx>=0?MONTHS[prevIdx]+'→'+monthLabel:'';
  if(topBranch){
    document.getElementById('k5').textContent=fmt(topVal);
    document.getElementById('k5s').textContent=topBranch.name+' · 26년 '+topMonthLabel;
  }

  buildAllMap();
  updateTabActive();
  renderBranches(lastIdx);
  renderTrend(data);
  renderDist(data, lastIdx);
  renderGrow(data);
  renderPie(data, lastIdx);
  renderMgr(data, lastIdx);
  renderRegionAvg(data, lastIdx);
  document.getElementById('distTitle').textContent=`매출 구간 분포 (${monthLabel} 기준)`;
  document.getElementById('rankTitle').textContent=`${monthLabel} 매출 순위 (상위 15개)`;

  requestAnimationFrame(()=>{
    const rightCard=document.querySelector('.main-grid .card:nth-child(2)');
    const branchScroll=document.getElementById('branchList');
    if(rightCard&&branchScroll){
      const rightH=rightCard.getBoundingClientRect().height;
      const titleEl=branchScroll.previousElementSibling;
      const titleH=titleEl?titleEl.getBoundingClientRect().height+10:40;
      branchScroll.style.maxHeight=(rightH-titleH-40)+'px';
    }
  });
}

// KPI 매장 목록 모달
function openKpiModal(type){
  const lastIdx = window.__lastIdx ?? 4;
  const monthLabel = MONTHS[lastIdx];
  let branches, title, sub;

  if(type==='over'){
    branches = (window.__overBranches||[]).map(b=>{
      const cur=b.months[lastIdx]||0;
      const v25=get25(b.name,lastIdx);
      const goal=getGoal(b.name,lastIdx);
      const rate=v25>0?((cur-v25)/v25*100):null;
      return {...b, cur, v25, goal, rate};
    }).sort((a,b)=>b.rate-a.rate);
    title=`${monthLabel} 전년비 5%↑ 목표 달성 매장`;
    sub=`총 ${branches.length}개 매장 · 전년 동월 대비 +5% 이상 달성`;
  } else {
    branches = (window.__stableBranches||[]).map(b=>{
      const cur=b.months[lastIdx]||0;
      const v25=get25(b.name,lastIdx);
      const rate=v25>0?((cur-v25)/v25*100):null;
      return {...b, cur, v25, rate};
    }).sort((a,b)=>b.rate-a.rate);
    title=`${monthLabel} 전년비 ±2% 유지 매장`;
    sub=`총 ${branches.length}개 매장 · 전년 대비 ±2% 이내 유지 중`;
  }

  document.getElementById('kpiModalTitle').textContent=title;
  document.getElementById('kpiModalSub').textContent=sub;
  document.getElementById('kpiModal').classList.add('open');

  const el=document.getElementById('kpiModalList');
  el.innerHTML=branches.map((b,i)=>{
    const rateTxt=b.rate!==null?(b.rate>=0?'+':'')+b.rate.toFixed(1)+'%':'-%';
    const rateCls=b.rate>=5?'pos':b.rate>=0?'warn':'neg';
    return `<div class="kml-item" style="cursor:pointer;" onclick="closeKpiModal();openBranchModal(window.__allMap&&window.__allMap['${b.name}']||${JSON.stringify(b)})">
      <div class="kml-left">
        <span class="kml-rank">${i+1}</span>
        <div>
          <div class="kml-name">${b.name}</div>
          <div class="kml-mgr">${b.manager} · ${b.region}</div>
        </div>
      </div>
      <div class="kml-right">
        <div class="kml-val">${fmt(b.cur)}</div>
        <div class="kml-rate ${rateCls}">${rateTxt} (전년 ${fmt(b.v25||0)})</div>
      </div>
    </div>`;
  }).join('');
}

function closeKpiModal(){
  document.getElementById('kpiModal').classList.remove('open');
}
document.getElementById('kpiModal').addEventListener('click',function(e){
  if(e.target===this) closeKpiModal();
});

function buildAllMap(){
  window.__allMap={};

}

// 매장 월별 매출 모달 -->
let modalChartInst=null;
function openBranchModal(b){
  const LOGISTICS = window.LOGISTICS || {};
  const active26=b.months.map((v,i)=>({v,i})).filter(x=>x.v>0);
  if(!active26.length) return;
  const d25=ALL25[b.name]||null;
  const labels=MONTHS; // 전체 12개월
  const vals26=b.months.map(v=>v>0?Math.round(v/10000):null);
  const vals25=d25?d25.map(v=>v>0?Math.round(v/10000):null):null;
  const goals=d25?d25.map(v=>v>0?Math.round(v*(1+GOAL_GROWTH)/10000):null):null;

  const allVals=[...vals26,...(vals25||[]),...(goals||[])].filter(v=>v!=null&&v>0);
  const minV=allVals.length?Math.min(...allVals):0;
  const maxV=allVals.length?Math.max(...allVals):1;
  const pad=Math.round((maxV-minV)*0.2)||100;

  document.getElementById('modalTitle').textContent=b.name+' — 월별 매출 비교 (25년 vs 26년)';
  document.getElementById('modalSub').textContent=b.manager+' · '+b.region+' · 목표: 전년 동월 대비 5%↑';
  document.getElementById('branchModal').classList.add('open');

  if(modalChartInst){modalChartInst.destroy();modalChartInst=null;}
  const datasets=[
    {type:'bar',label:'26년',data:vals26,backgroundColor:'rgba(55,138,221,0.8)',borderRadius:4,order:3},
  ];
  if(vals25) datasets.push({type:'line',label:'25년',data:vals25,borderColor:'#f0a04a',
    pointRadius:3,borderWidth:2,fill:false,borderDash:[4,3],order:2});
  if(goals) datasets.push({type:'line',label:'목표(전년+5%)',data:goals,borderColor:'#3db87a',
    pointRadius:0,borderWidth:1.5,fill:false,borderDash:[2,2],order:1});

  modalChartInst=new Chart(document.getElementById('modalChart'),{
    type:'bar',
    data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{datalabels:{display:false},legend:{display:true,labels:{color:'#6b8fa8',font:{size:10},boxWidth:12}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.parsed.y!=null?c.parsed.y.toLocaleString()+'만원':'없음')}}},
      scales:{x:{ticks:{color:'#6b8fa8',font:{size:10}},grid:{color:'#1a2f44'}},
        y:{min:Math.max(0,minV-pad),ticks:{color:'#6b8fa8',font:{size:10},callback:v=>{
          if(v>=10000) return (v/10000).toFixed(1)+'억';
          return v.toLocaleString()+'만';
        }},grid:{color:'#1a2f44'}}}}
  });

  // ── 월별 증감 수치 카드 ─────────────────────────────────
  const fmtD=v=>{
    if(!v||v<=0) return '-';
    if(v>=10000){ const u=Math.floor(v/10000),r=v%10000; return r>0?`${u}억 ${r.toLocaleString()}만원`:`${u}억`; }
    return v.toLocaleString()+'만원';
  };
  const summaryRows=MONTHS.map((mon,i)=>{
    const v26=vals26[i], v25=vals25?vals25[i]:null;
    if(v26==null&&v25==null) return null;
    const diff=(v26!=null&&v25!=null)?v26-v25:null;
    const rate=(diff!=null&&v25>0)?Math.round(diff/v25*1000)/10:null;
    const rateColor=rate==null?'#6b8fa8':rate>=0?'#3db87a':'#e05555';
    const rateStr=rate!=null?(rate>=0?`▲${rate}%`:`▼${Math.abs(rate)}%`):'-';
    const diffAbs=diff!=null?fmtD(Math.abs(diff)):'-';
    const diffStr=diff!=null?(diff>0?`+${diffAbs}`:diff<0?`-${diffAbs}`:'±0'):'-';
    const diffColor=diff==null?'#6b8fa8':diff>0?'#3db87a':diff<0?'#e05555':'#6b8fa8';
    return `<div style="min-width:80px;flex:1;background:#0d1b2a;border-radius:7px;padding:7px 8px;border:0.5px solid #1a2f44;text-align:center;">
  <div style="font-size:9px;color:#6b8fa8;margin-bottom:4px;font-weight:500;">${mon}</div>
  <div style="font-size:10px;color:#378add;font-weight:600;margin-bottom:2px;">${v26!=null?fmtD(v26):'-'}</div>
  <div style="font-size:9px;color:#f0a04a;margin-bottom:4px;">${v25!=null?fmtD(v25):'-'}</div>
  <div style="font-size:11px;font-weight:700;color:${rateColor};margin-bottom:2px;">${rateStr}</div>
  <div style="font-size:9px;color:${diffColor};font-weight:600;">${diffStr}</div>
</div>`;
  }).filter(r=>r!==null);

  document.getElementById('modalSummary').innerHTML=`
<div style="font-size:10px;color:#6b8fa8;margin-bottom:6px;font-weight:500;">월별 전년 대비 증감 &nbsp;<span style="color:#378add">■ 26년</span> &nbsp;<span style="color:#f0a04a">■ 25년</span></div>
<div style="display:flex;gap:5px;flex-wrap:wrap;">${summaryRows.join('')}</div>`;

  // ── 물류 매출 섹션 ─────────────────────────────────
  const logData = LOGISTICS[b.name] || null;
  const logEl = document.getElementById('modalLogistics');
  if(!logData || !logData.some(v=>v>0)){
    logEl.innerHTML='';
  } else {
    const logRows = MONTHS.map((mon,i)=>{
      const lv = logData[i]||0;
      const sv = b.months[i]||0;
      if(lv===0 && sv===0) return null;
      const ratio = (sv>0 && lv>0) ? (lv/sv*100).toFixed(1) : null;
      const lvStr = lv>0 ? fmtD(Math.round(lv/10000)) : '-';
      const ratioColor = ratio==null ? '#6b8fa8' : parseFloat(ratio)>=30 ? '#e05555' : parseFloat(ratio)>=20 ? '#f0a04a' : '#3db87a';
      const ratioStr = ratio!=null ? ratio+'%' : '-';
      return `<div style="min-width:80px;flex:1;background:#0a1220;border-radius:7px;padding:7px 8px;border:0.5px solid #1a2f44;text-align:center;">
  <div style="font-size:9px;color:#6b8fa8;margin-bottom:4px;font-weight:500;">${mon}</div>
  <div style="font-size:10px;color:#a78bfa;font-weight:600;margin-bottom:2px;">${lvStr}</div>
  <div style="font-size:11px;font-weight:700;color:${ratioColor};">${ratioStr}</div>
  <div style="font-size:8px;color:#4a6070;margin-top:1px;">매출대비</div>
</div>`;
    }).filter(r=>r!==null);

    logEl.innerHTML=`
<div style="border-top:0.5px solid #1a2f44;padding-top:12px;">
  <div style="font-size:10px;color:#6b8fa8;margin-bottom:6px;font-weight:500;">물류 매출 &nbsp;<span style="color:#a78bfa">■ 물류(공급가)</span> &nbsp;<span style="color:#6b8fa8">· 매출 대비 비중</span></div>
  <div style="display:flex;gap:5px;flex-wrap:wrap;">${logRows.join('')}</div>
</div>`;
  }
}

function loadCSV(text, filename){
  const parsed=parseCSV(text);
  if(!parsed.length){ alert('CSV 파싱 실패'); return; }
  ALL=parsed;
  currentFilter='all';
  currentSearch='';
  document.getElementById('branchSearch').value='';
  document.getElementById('searchClear').style.display='none';
  renderTabs();
  renderRegionTabs();
  render();
  const now=new Date();
  document.getElementById('lastUpdate').textContent=
    `${filename} · ${now.toLocaleDateString('ko-KR')} ${now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} 업데이트`;
}

document.getElementById('fileInput').addEventListener('change',function(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>loadCSV(ev.target.result, file.name);
  reader.readAsText(file,'UTF-8');
  e.target.value='';
});

// ===== 내장 데이터 =====
